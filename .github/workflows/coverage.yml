name: Coverage

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLIENT_ID: placeholder
      GOOGLE_CLIENT_SECRET: placeholder
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/deesl_test

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: deesl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"

      - name: Cache cargo tools
        id: cache-cargo-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-tarpaulin
            ~/.cargo/bin/diesel
          key: ${{ runner.os }}-cargo-tools-v2

      - name: Install tarpaulin
        if: steps.cache-cargo-tools.outputs.cache-hit != 'true'
        run: cargo install cargo-tarpaulin

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install diesel_cli
        if: steps.cache-cargo-tools.outputs.cache-hit != 'true'
        run: cargo install diesel_cli --no-default-features --features postgres

      - name: Run database migrations
        run: diesel migration run

      - name: Generate coverage report
        run: |
          cargo tarpaulin \
            --all-features \
            --workspace \
            --timeout 120 \
            --out xml \
            --out html \
            --output-dir coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: github.event_name == 'pull_request'
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate coverage summary
        id: coverage
        run: |
          # Extract coverage percentage from the XML
          COVERAGE=$(grep -o 'line-rate="[0-9.]*"' coverage/cobertura.xml | head -1 | sed 's/line-rate="//;s/"//')
          COVERAGE_PERCENT=$(echo "$COVERAGE * 100" | bc)
          echo "coverage=${COVERAGE_PERCENT%.*}%" >> $GITHUB_OUTPUT
          
          # Count covered vs total lines
          TOTAL_LINES=$(grep -o 'lines-valid="[0-9]*"' coverage/cobertura.xml | head -1 | sed 's/lines-valid="//;s/"//')
          COVERED_LINES=$(grep -o 'lines-covered="[0-9]*"' coverage/cobertura.xml | head -1 | sed 's/lines-covered="//;s/"//')
          echo "total_lines=$TOTAL_LINES" >> $GITHUB_OUTPUT
          echo "covered_lines=$COVERED_LINES" >> $GITHUB_OUTPUT

      - name: Comment PR with coverage
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const coverage = '${{ steps.coverage.outputs.coverage }}';
            const totalLines = '${{ steps.coverage.outputs.total_lines }}';
            const coveredLines = '${{ steps.coverage.outputs.covered_lines }}';
            
            const body = `## 📊 Code Coverage Report
            
            **Coverage:** ${coverage}
            
            **Lines Covered:** ${coveredLines} / ${totalLines}
            
            <details>
            <summary>View Full Coverage Details</summary>
            
            Coverage report has been generated and uploaded to Codecov.
            
            </details>
            
            ---
            *Generated by cargo-tarpaulin* ✅`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
