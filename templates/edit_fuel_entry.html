{% extends "layout.html" %}

{% block title %}Edit Fuel Entry - Deesl{% endblock %}

{% block content %}
<div class="card fade-in" style="max-width: 500px; margin: 0 auto;">
    <div class="card-header">
        <div class="card-title">✏️ Edit Fuel Entry</div>
    </div>
    
    <form action="/fuel-entries/{{ entry.id }}" method="post">
        <div class="form-group">
            <label>Vehicle</label>
            <input type="text" value="{{ vehicle.make }} {{ vehicle.model }} ({{ vehicle.registration }})" disabled style="background: var(--surface-hover);">
        </div>

        <div class="form-group" style="position: relative;">
            <label for="station_search">Station</label>
            <input type="hidden" id="station_id" name="station_id" value="{{ entry.station_id.unwrap_or(0) }}" required>
            <input type="text" 
                   id="station_search" 
                   name="q"
                   placeholder="Type to search stations..." 
                   autocomplete="off"
                   hx-get="/htmx/stations/search"
                   hx-trigger="keyup changed delay:200ms, focus"
                   hx-target="#station_results"
                   hx-indicator="#station-spinner"
                   value="{{ current_station_name }}"
                   style="width: 100%;"
                   oninput="document.getElementById('station_id').value = ''">
            <div id="station-spinner" class="htmx-indicator spinner" style="position: absolute; right: 0.75rem; top: 2.25rem;"></div>
            <div id="station_results" 
                 style="position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow); z-index: 100; max-height: 200px; overflow-y: auto;">
            </div>
        </div>

        <div class="form-group">
            <label for="mileage">Mileage (km)</label>
            <input type="number" id="mileage" name="mileage_km" value="{{ entry.mileage_km }}" required>
        </div>
        
        <div class="form-group">
            <label for="litres">Litres</label>
            <input type="number" id="litres" step="0.01" name="litres" value="{{ entry.litres }}" required>
        </div>
        
        <div class="form-group">
            <label for="cost">Cost (€)</label>
            <input type="number" id="cost" step="0.01" name="cost" value="{{ entry.cost }}" required>
        </div>

        <div class="form-group">
            <label for="filled_at">Date/Time</label>
            <input type="datetime-local" id="filled_at" name="filled_at" value="{{ filled_at_formatted }}" required>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);">
            <button type="submit">💾 Update Entry</button>
            <a href="/dashboard" class="btn btn-outline">Cancel</a>
            <button type="button" 
                    class="btn btn-outline btn-danger" 
                    style="margin-left: auto;"
                    hx-delete="/htmx/entries/{{ entry.id }}"
                    hx-confirm="Are you sure you want to delete this fuel entry?"
                    hx-target="body"
                    hx-swap="none"
                    hx-on::after-request="window.location.href='/dashboard'">Delete</button>
        </div>
    </form>
</div>

<script>
// Close station results when clicking outside
document.addEventListener('click', function(e) {
    const container = document.querySelector('.form-group[style*="position: relative"]');
    const results = document.getElementById('station_results');
    if (container && results && !container.contains(e.target)) {
        results.innerHTML = '';
    }
});
</script>
{% endblock %}
