{% extends "layout.html" %}

{% block title %}Login - Deesl{% endblock %}

{% block content %}
<div class="card fade-in" style="max-width: 400px; margin: 3rem auto; text-align: center; padding: 2.5rem;">
    <div style="margin-bottom: 1.5rem;">
        <div style="font-size: 4rem; margin-bottom: 1rem;">⛽</div>
        <h1 style="margin-bottom: 0.5rem; font-size: 1.75rem;">Welcome to Deesl</h1>
        <p style="color: var(--text-muted);">
            Track your fuel consumption and vehicle efficiency with ease.
        </p>
    </div>

    <a href="/auth/google" class="btn" style="width: 100%; box-sizing: border-box; display: flex; align-items: center; justify-content: center; gap: 0.75rem; padding: 0.875rem;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21.35,11.1H12.18V13.83H18.69C18.36,17.64 15.19,19.27 12.19,19.27C9.03,19.27 6.59,17.38 6.59,13.33C6.59,9.38 9.03,7.39 12.19,7.39C13.96,7.39 15.31,7.97 16.34,8.86L18.41,6.79C16.82,5.27 14.71,4.66 12.19,4.66C7.07,4.66 3.81,8.83 3.81,13.33C3.81,17.83 7.07,22 12.19,22C18.42,22 21.46,17.3 21.46,13.33C21.46,12.5 21.39,11.75 21.35,11.1V11.1Z" />
        </svg>
        Continue with Google
    </a>

    <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--text-muted);">
        By logging in, you agree to our Terms of Service.
    </div>
</div>
{% endblock %}
