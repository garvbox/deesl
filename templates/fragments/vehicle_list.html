{% if vehicles.is_empty() %}
    <div class="empty-state">
        <div class="empty-state-icon">🚗</div>
        <p>No vehicles found. Add your first vehicle to get started!</p>
    </div>
{% else %}
    <div style="display: grid; gap: 0.75rem;">
        {% for v in vehicles %}
            <div class="fade-in" style="padding: 1rem; background: var(--surface-hover); border: 1px solid var(--border); border-radius: var(--radius-sm); transition: all 0.2s ease;" id="vehicle-{{ v.id }}">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div style="font-weight: 600; color: var(--text);">{{ v.make }} {{ v.model }}</div>
                        <div style="color: var(--text-muted); font-size: 0.85rem; margin-top: 0.25rem;">{{ v.registration }}</div>
                    </div>
                    <button class="btn btn-outline btn-small btn-danger"
                            hx-delete="/vehicles/htmx/{{ v.id }}"
                            hx-target="#vehicle-{{ v.id }}"
                            hx-swap="outerHTML"
                            hx-confirm="Are you sure you want to delete this vehicle?">
                        Delete
                    </button>
                </div>
            </div>
        {% endfor %}
    </div>
{% endif %}
