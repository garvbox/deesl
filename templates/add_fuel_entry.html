{% extends "layout.html" %}

{% block title %}Add Fuel Entry - Deesl{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h1>Add Fuel Entry</h1>
    
    <form action="/fuel-entries" method="post" class="add-entry-form">
        <label>
            Vehicle
            <select name="vehicle_id" required>
                {% for vehicle in vehicles %}
                <option value="{{ vehicle.id }}">{{ vehicle.make }} {{ vehicle.model }} ({{ vehicle.registration }})</option>
                {% endfor %}
            </select>
        </label>

        <label>
            Station
            <select name="station_id" required>
                {% for station in stations %}
                <option value="{{ station.id }}">{{ station.name }}</option>
                {% endfor %}
            </select>
        </label>

        <label>
            Mileage (km)
            <input type="number" name="mileage_km" placeholder="Current odometer" required>
        </label>
        
        <label>
            Litres
            <input type="number" step="0.01" name="litres" placeholder="Amount filled" required>
        </label>
        
        <label>
            Cost
            <input type="number" step="0.01" name="cost" placeholder="Total cost" required>
        </label>

        <label>
            Date/Time
            <input type="datetime-local" name="filled_at" value="{{ current_time }}">
        </label>
        
        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit">Save Entry</button>
            <a href="/dashboard" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
