{% extends "layout.html" %}

{% block title %}Add Fuel Entry - Deesl{% endblock %}

{% block content %}
<div class="card fade-in" style="max-width: 500px; margin: 0 auto;">
    <div class="card-header">
        <div class="card-title">⛽ Add Fuel Entry</div>
    </div>
    
    <form action="/fuel-entries" method="post">
        <div class="form-group">
            <label for="vehicle">Vehicle</label>
            <select id="vehicle" name="vehicle_id" required>
                {% for vehicle in vehicles %}
                <option value="{{ vehicle.id }}">{{ vehicle.make }} {{ vehicle.model }} ({{ vehicle.registration }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="station">Station</label>
            <select id="station" name="station_id" required>
                {% for station in stations %}
                <option value="{{ station.id }}">{{ station.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="mileage">Mileage (km)</label>
            <input type="number" id="mileage" name="mileage_km" placeholder="Current odometer reading" required>
        </div>
        
        <div class="form-group">
            <label for="litres">Litres</label>
            <input type="number" id="litres" step="0.01" name="litres" placeholder="Amount filled" required>
        </div>
        
        <div class="form-group">
            <label for="cost">Cost (€)</label>
            <input type="number" id="cost" step="0.01" name="cost" placeholder="Total cost" required>
        </div>

        <div class="form-group">
            <label for="filled_at">Date/Time</label>
            <input type="datetime-local" id="filled_at" name="filled_at" value="{{ current_time }}">
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);">
            <button type="submit">💾 Save Entry</button>
            <a href="/dashboard" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
