{% extends "layout.html" %}

{% block title %}Dashboard - Deesl{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h1>Dashboard</h1>
    <a href="/vehicles/new" class="btn">Add Vehicle</a>
</div>

<div class="card">
    <h3>Your Vehicles</h3>
    <div id="vehicle-list" hx-get="/htmx/vehicles" hx-trigger="load">
        <p style="color: var(--text-muted);">Loading vehicles...</p>
    </div>
</div>

<div class="card">
    <h3>Recent Fuel Entries</h3>
    <div id="recent-entries" hx-get="/htmx/entries/recent" hx-trigger="load">
        <p style="color: var(--text-muted);">Loading recent entries...</p>
    </div>
</div>
{% endblock %}
