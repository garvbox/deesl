{% extends "layout.html" %}

{% block title %}Settings - Deesl{% endblock %}

{% block content %}
<h1>Settings</h1>

<div class="card" style="max-width: 500px;">
    <h3>Account Information</h3>
    <p><strong>Email:</strong> {{ user_email }}</p>
    
    <hr style="border: 0; border-top: 1px solid var(--border); margin: 1.5rem 0;">
    
    <h3>Preferences</h3>
    <form hx-patch="/settings" hx-target="#settings-message" hx-swap="innerHTML">
        <label>
            Preferred Currency
            <select name="currency" required>
                {% for c in currencies %}
                <option value="{{ c }}" {% if self.is_current_currency(c) %}selected{% endif %}>{{ c }}</option>
                {% endfor %}
            </select>
        </label>
        
        <button type="submit" style="margin-top: 0.5rem;">Save Preferences</button>
        <div id="settings-message" style="margin-top: 1rem;"></div>
    </form>
</div>

<div class="card" style="max-width: 500px;">
    <h3>Data Management</h3>
    <p>Need to import data from a CSV file?</p>
    <a href="/import" class="btn btn-outline">Go to Import</a>
</div>
{% endblock %}
