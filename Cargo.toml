[package]
name = "deesl"
version = "0.1.0"
edition = "2024"

[dependencies]
askama = "0.12.1"
axum = { version = "0.8.1", features = ["json", "tokio"] }
rstest = "0.25.0"
serde = { version = "1.0.219", features = ["derive"] }
tokio = { version = "1.44.1", features = ["macros", "rt-multi-thread"] }
tokio-util = "0.7.14"
tower-livereload = "0.9.6"
tracing = "0.1.41"
tracing-subscriber = "0.3.19"
validator = "0.20.0"
